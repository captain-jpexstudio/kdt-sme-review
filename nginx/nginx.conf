events {}

http {
  upstream api { server api:8000; }
  upstream web { server web:3000; }

  # 데이터셋 xlsx 업로드 대비(기본 1m로는 부족). 2,100문항 ≈ 1.4MB.
  client_max_body_size 50m;

  server {
    listen 80;
    server_name _;

    # 검수앱 SPA(Next.js)
    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API + SSE (admin live)
    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # SSE
      proxy_buffering off;
      proxy_read_timeout 3600s;
    }
  }

  # TLS는 P6/배포 단계에서 certs 추가 후 활성화 (spec §17)
}
